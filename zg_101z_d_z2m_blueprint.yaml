blueprint:
  name: "ZG-101Z/D Zigbee Smart Knob (Zigbee2MQTT)"
  description: >
    ## Tuya / Moes ZG-101Z/D Smart Knob — Z2M Blueprint

    Assign Home Assistant actions to every gesture your ZG-101Z/D smart knob
    can produce via Zigbee2MQTT.

    ### Supported gestures

    **Event mode** (set `operation_mode` → `event` in Z2M):
    - Single press · Double press · Hold
    - Rotate Left (CCW) · Rotate Right (CW)

    **Command mode** (set `operation_mode` → `command` in Z2M):
    - Toggle · Brightness Step Up/Down
    - Color Temperature Step Up/Down
    - Saturation Move · Hue Move · Hue Stop
    - Rotate Left (CCW) · Rotate Right (CW)

    ### Setup
    1. In the Z2M dashboard find your knob's **Friendly Name** (e.g. `living_room_knob`).
    2. Enter the full MQTT topic below — normally `zigbee2mqtt/<FRIENDLY_NAME>`.
    3. Set the desired `operation_mode` directly in Z2M (the blueprint handles both modes automatically).

    ### Template variables available in every action
    The following Z2M payload fields are exposed as template variables so you can
    use them inside your action sequences:

    | Variable | Description |
    |---|---|
    | `action` | The raw action string (e.g. `rotate_left`) |
    | `action_step_size` | Step size reported by the knob (0–255) |
    | `action_transition_time` | Transition time in seconds |
    | `action_rate` | Rate reported by the knob (0–255) |
    | `battery` | Current battery level (%) |

    Example — scale brightness by step size:
    ```yaml
    service: light.turn_on
    target:
      entity_id: light.living_room
    data:
      brightness_step: "{{ (action_step_size / 255 * 50) | int }}"
    ```

  domain: automation
  input:

    # ── Device ──────────────────────────────────────────────────────────────────
    z2m_topic:
      name: "Z2M MQTT Topic"
      description: >
        Full Zigbee2MQTT topic for your knob.
        Format: `zigbee2mqtt/<FRIENDLY_NAME>`
      selector:
        text:

    # ── Event mode ──────────────────────────────────────────────────────────────
    action_single:
      name: "Single Press"
      description: "Fired on a single button click (event mode)."
      default: []
      selector:
        action:

    action_double:
      name: "Double Press"
      description: "Fired on a double button click (event mode)."
      default: []
      selector:
        action:

    action_hold:
      name: "Hold"
      description: "Fired while the button is held down (event mode)."
      default: []
      selector:
        action:

    action_rotate_left:
      name: "Rotate Left (CCW)"
      description: "Fired on a counter-clockwise rotation (both modes)."
      default: []
      selector:
        action:

    action_rotate_right:
      name: "Rotate Right (CW)"
      description: "Fired on a clockwise rotation (both modes)."
      default: []
      selector:
        action:

    # ── Command mode ─────────────────────────────────────────────────────────────
    action_toggle:
      name: "Toggle"
      description: "Fired on a press/toggle (command mode)."
      default: []
      selector:
        action:

    action_brightness_step_up:
      name: "Brightness Step Up"
      description: "Fired on brightness increase rotation (command mode). Use `action_step_size` for the step magnitude."
      default: []
      selector:
        action:

    action_brightness_step_down:
      name: "Brightness Step Down"
      description: "Fired on brightness decrease rotation (command mode). Use `action_step_size` for the step magnitude."
      default: []
      selector:
        action:

    action_color_temp_step_up:
      name: "Color Temperature Step Up"
      description: "Fired when color temperature is stepped warmer (command mode)."
      default: []
      selector:
        action:

    action_color_temp_step_down:
      name: "Color Temperature Step Down"
      description: "Fired when color temperature is stepped cooler (command mode)."
      default: []
      selector:
        action:

    action_saturation_move:
      name: "Saturation Move"
      description: "Fired on a saturation move gesture (command mode)."
      default: []
      selector:
        action:

    action_hue_move:
      name: "Hue Move"
      description: "Fired when the knob starts a hue-move gesture (command mode)."
      default: []
      selector:
        action:

    action_hue_stop:
      name: "Hue Stop"
      description: "Fired when a hue-move gesture ends (command mode)."
      default: []
      selector:
        action:

# ── Automation body ────────────────────────────────────────────────────────────
mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: !input z2m_topic

# Ignore state-update messages that carry no action (action is null / empty string)
condition:
  - condition: template
    value_template: >
      {{ trigger.payload_json.action is defined
         and trigger.payload_json.action not in ['', none, null] }}

action:
  # Expose Z2M payload fields as local variables for use in action sequences
  - variables:
      action:                "{{ trigger.payload_json.action | default('') }}"
      action_step_size:      "{{ trigger.payload_json.action_step_size | default(0) | int }}"
      action_transition_time: "{{ trigger.payload_json.action_transition_time | default(0) | float }}"
      action_rate:           "{{ trigger.payload_json.action_rate | default(0) | int }}"
      battery:               "{{ trigger.payload_json.battery | default(0) | int }}"

  - choose:

      # ── Event mode ────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'single' }}"
        sequence: !input action_single

      - conditions:
          - condition: template
            value_template: "{{ action == 'double' }}"
        sequence: !input action_double

      - conditions:
          - condition: template
            value_template: "{{ action == 'hold' }}"
        sequence: !input action_hold

      # rotate_left/right fire in both modes
      - conditions:
          - condition: template
            value_template: "{{ action == 'rotate_left' }}"
        sequence: !input action_rotate_left

      - conditions:
          - condition: template
            value_template: "{{ action == 'rotate_right' }}"
        sequence: !input action_rotate_right

      # ── Command mode ──────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ action == 'toggle' }}"
        sequence: !input action_toggle

      - conditions:
          - condition: template
            value_template: "{{ action == 'brightness_step_up' }}"
        sequence: !input action_brightness_step_up

      - conditions:
          - condition: template
            value_template: "{{ action == 'brightness_step_down' }}"
        sequence: !input action_brightness_step_down

      - conditions:
          - condition: template
            value_template: "{{ action == 'color_temperature_step_up' }}"
        sequence: !input action_color_temp_step_up

      - conditions:
          - condition: template
            value_template: "{{ action == 'color_temperature_step_down' }}"
        sequence: !input action_color_temp_step_down

      - conditions:
          - condition: template
            value_template: "{{ action == 'saturation_move' }}"
        sequence: !input action_saturation_move

      - conditions:
          - condition: template
            value_template: "{{ action == 'hue_move' }}"
        sequence: !input action_hue_move

      - conditions:
          - condition: template
            value_template: "{{ action == 'hue_stop' }}"
        sequence: !input action_hue_stop
